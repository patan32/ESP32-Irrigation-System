        icon: mdi:airplane
        color: purple
        vertical: false
        features_position: inline
      - type: tile
        grid_options:
          columns: 4
          rows: 1
        entity: sensor.irrigation_test_controller_time_restriction_next_allowed
        name: Next Watering Allowed
        icon: mdi:clock-fast
        color: cyan
        vertical: false
        features_position: inline
  - type: grid
    column_span: 1
    columns: 1
    cards:
      - type: heading
        heading: Controls
        heading_style: title
        icon: mdi:remote
      - type: custom:mushroom-template-card
        primary: Start All Zones
        secondary: Run all zones normally
        icon: mdi:play-circle
        icon_color: green
        layout: horizontal
        fill_container: true
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.irrigation_test_controller_lawn_start_all_zones_normal
      - type: custom:mushroom-template-card
        primary: Cycle & Soak
        secondary: Smart multi-cycle mode
        icon: mdi:water-sync
        icon_color: blue
        layout: horizontal
        fill_container: true
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.irrigation_test_controller_lawn_start_all_zones_cycle_soak
      - type: custom:mushroom-template-card
        primary: Pause
        secondary: Pause current run
        icon: mdi:pause-circle
        icon_color: amber
        layout: horizontal
        fill_container: true
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.irrigation_test_controller_lawn_pause
      - type: custom:mushroom-template-card
