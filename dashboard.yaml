        secondary: Continue paused run
        icon: mdi:play-circle-outline
        icon_color: light-green
        layout: horizontal
        fill_container: true
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.irrigation_test_controller_lawn_resume
      - type: custom:mushroom-template-card
        primary: Stop All
        secondary: Stop everything immediately
        icon: mdi:stop-circle
        icon_color: red
        layout: horizontal
        fill_container: true
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.irrigation_test_controller_lawn_stop
  - type: grid
