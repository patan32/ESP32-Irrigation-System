        icon: mdi:water-pump
      - type: gauge
        entity: sensor.irrigation_test_controller_lawn_irrigation_controller_flow_rate
        name: Live Flow Rate
        unit: L/min
        min: 0
        max: 40
        needle: true
        severity:
          green: 0
          yellow: 20
          red: 32
      - type: tile
        entity: >-
          sensor.irrigation_test_controller_lawn_irrigation_controller_flow_session_volume
