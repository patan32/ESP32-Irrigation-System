        vertical: false
        tap_action:
          action: toggle
        features_position: bottom
      - type: tile
        entity: switch.irrigation_test_controller_vacation_mode
        name: Vacation Mode
        icon: mdi:airplane
        color: purple
        vertical: false
        tap_action:
          action: toggle
      - type: tile
        entity: number.irrigation_test_controller_lawn_zone_runtime_limit
        name: Runtime Limit
        icon: mdi:timer-cog-outline
        color: cyan
        vertical: false
        features_position: inline
      - type: tile
        entity: switch.irrigation_test_controller_lawn_auto_advance
        name: Auto Advance Zones
        icon: mdi:skip-next-circle-outline
        color: green
        vertical: false
        tap_action:
          action: toggle
        features_position: bottom
      - type: tile
        entity: switch.irrigation_test_controller_cycle_and_soak_mode
        name:
          type: entity
        icon: mdi:water-sync
        color: green
        vertical: false
        tap_action:
          action: toggle
        features_position: bottom
      - type: tile
        entity: switch.irrigation_test_controller_lawn_enable_forecast_integration
        name: Forecast Integration
        icon: mdi:weather-partly-cloudy
        color: green
        vertical: false
        tap_action:
          action: toggle
        features_position: bottom
      - type: tile
        entity: switch.irrigation_test_controller_time_restriction_enable
        name:
          type: entity
        icon: ""
        color: green
        vertical: false
        tap_action:
          action: toggle
        features_position: bottom
      - type: tile
        entity: switch.irrigation_test_controller_time_restriction_override
        name: Time Restriction Override
        icon: mdi:clock-edit
        color: orange
        vertical: false
        tap_action:
          action: toggle
        features_position: bottom
  - type: grid
    columns: 4
    cards:
      - type: heading
        heading: Program Status
        heading_style: title
        icon: mdi:list-status
