type: sections
max_columns: 3
title: Irrigation
path: irrigation
icon: mdi:sprinkler-variant
badges:
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: sensor.irrigation_test_controller_current_day
    name: Current Day
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: sensor.irrigation_test_controller_current_time
    name: Time
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: sensor.irrigation_test_controller_weather_condition
    name: Weather
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: sensor.irrigation_controller_lawn_rain_forecast_summary
    name: Rain Forecast
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: >-
      sensor.irrigation_test_controller_lawn_irrigation_controller_last_watering_trigger
    name: Watering Trigger
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: sensor.irrigation_test_controller_lawn_irrigation_controller_flow_rate
    name: Flow Rate
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: >-
      sensor.irrigation_test_controller_lawn_irrigation_controller_time_remaining
    show_entity_picture: false
    name: Irrigation Time Remaining
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: sensor.irrigation_test_controller_lawn_irrigation_controller_progress
    name: Irrigation Progress
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: >-
      sensor.irrigation_test_controller_lawn_irrigation_controller_last_block_reason
    name: Last Zone Block Reason
sections:
  - type: grid
    column_span: 1
    columns: 4
    cards:
      - type: heading
        icon: mdi:list-status
        heading: System Status
        heading_style: title
      - type: custom:mushroom-template-card
        primary: >
          {% set t =
          states('sensor.irrigation_test_controller_lawn_irrigation_controller_status')
          %} {% set idle =
          ['none','unavailable','unknown','','idle','off','inactive'] %} {% if t
          | lower not in idle %}{{ t }}{% else %}System Idle{% endif %}
        secondary: >
          {% set t =
          states('sensor.irrigation_test_controller_lawn_irrigation_controller_status')
          %} {% set idle =
          ['none','unavailable','unknown','','idle','off','inactive'] %} {% if t
          | lower not in idle %}🟢 Irrigation Running{% else %}No zones active{%
          endif %}
        icon: >
          {% set t =
          states('sensor.irrigation_test_controller_lawn_irrigation_controller_status')
          %} {% set idle =
          ['none','unavailable','unknown','','idle','off','inactive'] %} {{
          'mdi:sprinkler' if t | lower not in idle else 'mdi:sprinkler-variant'
          }}
        badge_icon: >
          {% set t =
          states('sensor.irrigation_test_controller_lawn_irrigation_controller_status')
          %} {% set idle =
          ['none','unavailable','unknown','','idle','off','inactive'] %} {% if t
          | lower not in idle %}mdi:water{% endif %}
        badge_color: green
        color: >
          {% set t =
          states('sensor.irrigation_test_controller_lawn_irrigation_controller_status')
          %} {% set idle =
          ['none','unavailable','unknown','','idle','off','inactive'] %} {{
          'green' if t | lower not in idle else 'blue' }}
      - type: tile
        entity: sensor.irrigation_test_controller_cycle_soak_detailed_status
        name: Soak Cycle Status
        icon: mdi:water-sync
        color: indigo
        vertical: false
      - type: tile
        entity: >-
          sensor.irrigation_test_controller_lawn_irrigation_controller_time_remaining
        name: Time Remaining
        icon: mdi:timer-sand
        color: teal
        vertical: false
      - type: tile
        entity: sensor.irrigation_test_controller_lawn_irrigation_controller_progress
        name: Progress
        icon: mdi:chart-arc
        color: cyan
        vertical: false
      - type: tile
        entity: >-
          sensor.irrigation_test_controller_lawn_irrigation_controller_flow_session_volume
        name: Total Water Today
        icon: mdi:water-outline
        color: blue
        vertical: false
        features_position: bottom
      - type: tile
        entity: sensor.irrigation_test_controller_lawn_total_water_used
        name: Lawn Total Water Used
        icon: mdi:water-pump
        color: blue
        vertical: false
        features_position: bottom
      - type: tile
        entity: sensor.irrigation_test_controller_lawn_irrigation_controller_flow_rate
        name: Flow Rate
        icon: mdi:gauge
        color: blue
        vertical: false
      - type: tile
        entity: binary_sensor.irrigation_test_controller_lawn_master_valve_status
        name: Master Valve
        icon: mdi:pipe-valve
        color: green
        vertical: false
      - type: tile
        entity: >-
          binary_sensor.irrigation_test_controller_lawn_irrigation_controller_leak_detected
        name: Leak Detector
        icon: mdi:water-alert-outline
        color: red
        vertical: false
      - type: tile
        entity: >-
          binary_sensor.irrigation_test_controller_lawn_irrigation_blackout_active
        name: Blackout
        icon: mdi:cancel
        color: amber
        vertical: false
      - type: tile
        grid_options:
          columns: 12
          rows: 1
        entity: >-
          sensor.irrigation_test_controller_lawn_irrigation_controller_last_block_reason
        name: Last Zone Block Reason
        color: amber
        vertical: false
        features_position: bottom
  - type: grid
    column_span: 1
    columns: 5
    cards:
      - type: heading
        icon: mdi:toggle-switch
        heading: Program Switches
        heading_style: title
      - type: tile
        entity: switch.irrigation_test_controller_irrigation_system_enable
        name: System Enabled
        icon: mdi:power
        color: green
        vertical: false
        tap_action:
          action: toggle
      - type: tile
        entity: switch.irrigation_test_controller_lawn_enable_master_valve
        name: Master Valve
        icon: mdi:pipe-valve
        color: green
        vertical: false
        tap_action:
          action: toggle
      - type: tile
        entity: switch.irrigation_test_controller_lawn_budget_override
