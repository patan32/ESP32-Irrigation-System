                    : (current_time_minutes >= start_minutes || current_time_minutes < end_minutes);
                if (in_win3) in_window = true;
              }
              
              // If all windows disabled, allow anytime
              if (!id(window1_enabled) && !id(window2_enabled) && !id(window3_enabled)) {
                in_window = true;
              }
              
              if (!in_window) {
                ESP_LOGW("irrigation", "🕐 Smart ET BLOCKED - Outside watering windows (current: %d:%02d)", 
