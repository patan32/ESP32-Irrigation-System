  # Expose Time Remaining as a sensor
  - platform: template
    id: dev1_time_remaining
    name: $upper_devicename1 Time Remaining
    update_interval: $sensor_update_frequency
    icon: "mdi:timer-sand"
    lambda: |-
      // BUG FIX: In C&S mode, time_remaining_active_valve() only returns the
      // current cycle's remaining seconds, not the total remaining time across
      // all remaining cycles and soaks. Use cycle_soak_total - elapsed instead.
      int seconds = 0;
      if (id(cycle_soak_switch).state && id(cycle_soak_total_duration) > 0
          && (id(irrigation_busy) || id($devicename1).active_valve().has_value())) {
        seconds = id(cycle_soak_total_duration) - id(cycle_soak_elapsed_time);
        if (seconds < 0) seconds = 0;
      } else {
        // Normal mode: time_remaining_active_valve() is always correct here
        // (C&S path above handled the case where remaining != total remaining)
        seconds = (int)round(id($devicename1).time_remaining_active_valve().value_or(0));
      }
      int days = seconds / (24 * ${seconds_per_hour});
      seconds = seconds % (24 * ${seconds_per_hour});
      int hours = seconds / ${seconds_per_hour};
      seconds = seconds % ${seconds_per_hour};
      int minutes = seconds /  60;
      seconds = seconds % 60;
      std::string result = "";
      if (days) result += std::to_string(days) + "d ";
      if (hours) result += std::to_string(hours) + "h ";
      if (minutes) result += std::to_string(minutes) + "m ";
      result += std::to_string(seconds) + "s";
      return result;
          
# Expose Progress Percent as a sensor
  - platform: template
    id: dev1_progress_percent
    name: $upper_devicename1 Progress %
    update_interval: $sensor_update_frequency
    icon: "mdi:progress-clock"
    lambda: |-
      // BUG FIX: Cycle & Soak progress was broken because valve_run_duration_adjusted
      // returns the FULL zone duration (e.g. 12 min) while time_remaining counts down
      // from only one CYCLE duration (e.g. 3 min), so elapsed = 12-3 = 9 min = 75%
      // at the very start of every cycle. Fix: use the dedicated C&S elapsed/total
      // counters which correctly track time including soaks across all zones.
      
      // CYCLE & SOAK MODE: use dedicated elapsed/total counters
      // (covers both single-zone C&S and all-zones C&S runs)
      if (id(cycle_soak_switch).state && id(cycle_soak_total_duration) > 0) {
        // During a soak the valve is off but the run is still in progress
        bool run_active = id(irrigation_busy) || id($devicename1).active_valve().has_value();
        if (!run_active) return {"0%"};
        int elapsed = id(cycle_soak_elapsed_time);
        int total   = id(cycle_soak_total_duration);
        int progress = (total > 0) ? (int)((elapsed / (float)total) * 100.0f) : 0;
        if (progress < 0)   progress = 0;
        if (progress > 100) progress = 100;
        return {std::to_string(progress) + "%"};
      }
      
      // NORMAL MODE: use stored actual run duration (not the UI slider value)
      if (!id($devicename1).active_valve().has_value()) {
        return {"0%"};
      }
      
      auto remaining = id($devicename1).time_remaining_active_valve().value_or(0);
      // Use actual started duration; fall back to valve_run_duration_adjusted
      // only if normal_run_duration_seconds was never set (edge case).
      auto valve_num = id($devicename1).active_valve().value();
      float duration = (id(normal_run_duration_seconds) > 0)
          ? (float)id(normal_run_duration_seconds)
          : (float)id($devicename1).valve_run_duration_adjusted(valve_num);
      
      if (duration <= 0 || remaining < 0) {
        return {"0%"};
      }
      
      float elapsed_n = duration - (float)remaining;
      int progress = (int)((elapsed_n / duration) * 100.0f);
      
      if (progress < 0) progress = 0;
      if (progress > 100) progress = 100;
      
      return {std::to_string(progress) + "%"};
      
