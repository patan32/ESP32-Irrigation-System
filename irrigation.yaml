          if (id(zone_run_blocked)) return;  // Safety blocked in pre-flight
          int zone_count = 0;
          if (id(zone1_program) == program && id(zone1_enable).state) zone_count++;
          if (id(zone2_program) == program && id(zone2_enable).state) zone_count++;
