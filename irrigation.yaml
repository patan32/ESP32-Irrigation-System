  # ═══════════════════════════════════════════════
  # PRODUCTION FEATURES - UI CONTROLS
  # ═══════════════════════════════════════════════
  
  # Freeze Protection Threshold
  - platform: template
    id: freeze_threshold_input
    name: "$dev1_what Freeze Threshold"
    min_value: -5
    max_value: 10
    step: 0.5
    icon: "mdi:snowflake-thermometer"
    mode: box
    unit_of_measurement: "°C"
    lambda: "return id(freeze_threshold);"
    set_action:
      - lambda: |-
          id(freeze_threshold) = x;
          ESP_LOGI("irrigation", "❄️ Freeze threshold set to %.1f°C", x);
          id(freeze_threshold_input).publish_state(x);
  
  # Monthly Water Budget
  - platform: template
    id: monthly_budget_input
    name: "$dev1_what Monthly Water Budget"
    min_value: 1000
    max_value: 100000
    step: 100
    icon: "mdi:water-pump"
    mode: box
    unit_of_measurement: "L"
    lambda: "return id(monthly_water_budget);"
    set_action:
      - lambda: |-
          id(monthly_water_budget) = x;
          ESP_LOGI("irrigation", "💰 Monthly water budget set to %.0f L", x);
          id(monthly_budget_input).publish_state(x);
  
  # Zone Daily Runtime Limit
  - platform: template
    id: zone_runtime_limit_input
    name: "$dev1_what Zone Runtime Limit"
    min_value: 30
    max_value: 240
    step: 5
    icon: "mdi:timer-sand"
    mode: slider
    unit_of_measurement: "min"
    lambda: "return id(max_zone_runtime_daily);"
    set_action:
      - lambda: |-
          id(max_zone_runtime_daily) = (int)x;
          ESP_LOGI("irrigation", "⏱️ Zone daily runtime limit set to %.0f minutes", x);
          id(zone_runtime_limit_input).publish_state(x);
  
  # Watering Window 1 - Start Hour (12-hour format)
  - platform: template
    id: window1_start_input
    name: "$dev1_what Window 1 Start Hour"
    min_value: 1
    max_value: 12
    step: 1
    icon: "mdi:clock-start"
    mode: box
    unit_of_measurement: "h"
    lambda: |-
      // Convert stored 24-hour to 12-hour for display
      int hour_24 = id(window1_start_hour);
      if (hour_24 == 0) return 12;  // Midnight = 12 AM
