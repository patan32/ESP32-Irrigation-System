  - platform: template
    internal: true
    id: ${devicename1}_1
    optimistic: true
    turn_on_action:
      - lambda: |-
          // ── SCRIPTED PATH: checks already done, irrigation_busy already set ──
          if (id(irrigation_busy) || id(test_mode_active)) {
            return;  // relay fired by output.turn_on: action below
          }
          // ── DIRECT SWITCH PATH: consolidated safety check via is_safe_to_water ──
          // is_safe_to_water evaluates: paused, system enable, freeze, budget, rain delay,
          // time restriction, blackout, weather. Per-condition logging happens here.
          if (!id(is_safe_to_water).state) {
            // Determine specific blocking reason for better UX
            std::string _reason;
            if (id(is_paused)) {
              _reason = "⏸️ System is paused";
            } else if (!id(irrigation_system_enable).state) {
              _reason = "🚫 Irrigation system disabled";
            } else if (id(freeze_protection_active)) {
              _reason = "❄️ Freeze protection active";
            } else if (id(budget_exceeded) && !id(budget_override_active)) {
              _reason = "💧 Monthly water budget exceeded";
            } else {
              auto _now = id(homeassistant_time).now();
              if (_now.is_valid() && id(rain_delay_end_time) > _now.timestamp) {
                int64_t rd_days = (id(rain_delay_end_time) - _now.timestamp) / ${seconds_per_day};
                char _rb[60];
                snprintf(_rb, sizeof(_rb), "🌧️ Zone 1 blocked - Rain delay (%lld day(s))", rd_days);
                _reason = std::string(_rb);
              } else if (id(is_time_restricted)) {
                _reason = "⏰ Time restriction active";
              } else if (id(is_blackout_date).state) {
                _reason = "🚫 Blackout date active";
              } else if (!id(manual_weather_override)) {
                std::string w = id(weather_forecast_home).state;
                if (!w.empty() && w != "unknown" && w != "unavailable") {
                  if (w == "rainy" || w == "pouring" || w == "snowy" || w == "snowy-rainy") {
                    _reason = "⛈️ Bad weather blocked";
                  }
                }
              }
            }
            if (_reason.empty()) _reason = "🚫 Zone 1 blocked - system check failed";
            ESP_LOGW("irrigation", "🚫 Zone 1 BLOCKED (direct) - %s", _reason.c_str());
            id(last_zone_block_reason) = _reason;
            id(zone_block_reason_sensor).publish_state(_reason);
            id(${devicename1}_1).turn_off(); return;
          }
          // Zone-specific: zone enable check
          if (!id(zone1_enable).state) {
            ESP_LOGW("irrigation", "🚫 Zone 1 BLOCKED (direct) - zone disabled");
            std::string _reason = "🚫 Zone 1 disabled (direct switch)";
            id(last_zone_block_reason) = _reason;
            id(zone_block_reason_sensor).publish_state(_reason);
            id(${devicename1}_1).turn_off(); return;
          }
          // ✅ All checks passed — route through request_zone_start for full duration management.
          // BUG #44 FIX: request_zone_start's busy check now ignores active_valve() for this zone
          // (only blocks on irrigation_busy, or if a DIFFERENT zone is active). This allows the
          // direct-switch path to work even though the sprinkler component already set active_valve()
          // when it saw the zone switch turn on — before this lambda ran.
          // After request_zone_start sets irrigation_busy=true, the if: block below fires
          // output.turn_on — this is harmless (the relay is already being managed by
          // run_zone_with_cycles → sprinkler.start_single_valve → scripted path).
          ESP_LOGI("irrigation", "📍 TRIGGER: Manual: ${dev1_zone1} (direct → routed to request_zone_start)");
          // The if: block below will fire output.turn_on once irrigation_busy=true (harmless double-on).
          id(request_zone_start).execute(0, (int)(id(Lawn_irrigation_controller_1_duration).state * 60), false, false, std::string("Manual: ${dev1_zone1}"));
          // DON'T set irrigation_busy here — request_zone_start will set it once all checks pass.
      - if:
          condition:
            lambda: 'return id(irrigation_busy) || id(test_mode_active);'
          then:
            - output.turn_on: relay_zone_1_out
    turn_off_action:
      - output.turn_off: relay_zone_1_out
    on_turn_on:
      - lambda: |-
          // All safety checks run in turn_on_action before the relay fired.
          // If blocked, turn_on_action called turn_off() and irrigation_busy is still
          // false — skip state recording and let on_turn_off clean up the UI.
          if (!id(irrigation_busy) && !id(test_mode_active)) return;
          
          auto _ts = id(homeassistant_time).now();
          id(zone1_start_time) = _ts.is_valid() ? _ts.timestamp : 0;
          id(flow_zone_start_pulses) = id(flow_pulse_total);
          id(flow_sensor_session_litres) = 0.0f;
          id(zone_flow_active) = true;
          ESP_LOGD("flow", "Zone 1 start: pulse snapshot = %.1f", id(flow_zone_start_pulses));
          ESP_LOGI("irrigation", "🚀 ${dev1_zone1} STARTED - Trigger: %s", id(watering_trigger_source).c_str());
          id(dev1_valve_status).publish_state("$dev1_zone1 Active");
    on_turn_off:
      - lambda: |-
          // Only reset to Idle if NOT mid-soak (between cycles in Cycle & Soak mode).
          // During a soak the valve turns off but the system is still running — showing
          // "Idle" here is misleading. Let the soak-complete handler set Idle instead.
          // BUG #47 FIX: Only show Idle if the WHOLE run is done — not between zones.
          // OLD: !busy || !soaking → showed Idle between program zones (station delay).
          // NEW: also check !in_program_run so multi-zone programs show status correctly.
          if (!id(irrigation_busy) || (!id(cycle_soak_is_soaking) && !id(in_program_run))) {
            id(dev1_valve_status).publish_state("Idle");
          }
      - lambda: |-
          // ── on_turn_off: SOLE source of water accounting (no duplicate in run_zone_with_cycles) ──
          // Skip if start_time was never set (zone was blocked before starting)
          if (id(zone1_start_time) == 0) {
            ESP_LOGD("irrigation", "Zone 1 turn_off: start_time=0, skipping water accounting");
            return;
          }
          // If HA time not available, skip — we cannot compute a valid duration
          auto now_ts = id(homeassistant_time).now();
          if (!now_ts.is_valid()) {
            id(zone1_start_time) = 0;
            ESP_LOGW("irrigation", "Zone 1 turn_off: time unavailable, run not recorded");
            return;
          }
          int64_t duration = now_ts.timestamp - id(zone1_start_time);
          id(zone1_start_time) = 0;  // Reset for next use


          // ── Snapshot and reset flow sensor session (always, even short runs) ──
          // Compute session litres from total pulse count delta
          // This is exact: (pulses at zone end) - (pulses at zone start) / PPL
          // No timing sensitivity, no partial ticks, no accumulation drift.
          id(zone_flow_active) = false;
          float end_pulses  = id(flow_pulse_total);
          float zone_pulses = (end_pulses >= id(flow_zone_start_pulses))
                           ? (end_pulses - id(flow_zone_start_pulses)) : 0.0f;
          float sensor_litres = zone_pulses / ${flow_sensor_pulses_per_litre}.0f;
          id(flow_sensor_session_litres) = sensor_litres;
          ESP_LOGI("flow", "Zone 1 end: %.0f pulses -> %.3f L (start=%.0f end=%.0f)",
                   zone_pulses, sensor_litres, id(flow_zone_start_pulses), end_pulses);
          // Publish final accurate value to HA immediately
          id(flow_sensor_session_volume).publish_state(sensor_litres);

          // ── Always record last watered time ──
          id(zone1_last_watered) = now_ts.timestamp;
          id(zone1_last_trigger) = id(watering_trigger_source);
          id(last_watering_timestamp) = now_ts.timestamp;
          id(last_watering_trigger_text) = id(watering_trigger_source);  // Global: feeds 'Last Watering Trigger' sensor
          // Immediately push updated trigger to HA (sensor uses update_interval: never)
          id(last_watering_trigger_sensor).publish_state(id(last_watering_trigger_text));

          // ── Update runtime today (always, even short runs) ──
          id(zone1_runtime_today) += (int)duration;

          // Only record water for runs > 5 seconds (filters relay test clicks)
          if (duration > 5) {
            float water_used;
            if (sensor_litres > 0.1f) {
              water_used = sensor_litres;
              ESP_LOGI("flow", "💧 Zone 1 MEASURED  %.2f L | Duration: %llds", water_used, duration);
            } else {
              water_used = (duration / 60.0f) * id(zone1_flow_rate);
              ESP_LOGI("flow", "💧 Zone 1 ESTIMATED %.2f L | Duration: %llds (no sensor data)", water_used, duration);
            }

            // Single guard for all water accounting (prevents start_time=0 bug)
            if (water_used > 0.0f && water_used < 10000.0f) {
              id(zone1_water_litres) += water_used;
              id(total_water_litres) += water_used;
              if (isnan(id(current_month_usage)) || std::isinf(id(current_month_usage)) || id(current_month_usage) < 0.0f) {
                ESP_LOGE("irrigation", "❌ Corrupted current_month_usage (%.1f) - resetting", id(current_month_usage));
                id(current_month_usage) = 0.0f;
                id(nvs_corruption_detected) = true;
              }
              id(current_month_usage) += water_used;
              if (id(current_month_usage) > 1000000.0f) {
                ESP_LOGE("irrigation", "❌ Monthly usage exceeded limits - resetting");
                id(current_month_usage) = water_used;
                id(nvs_corruption_detected) = true;
              }
              ESP_LOGI("irrigation", "✅ Zone 1 done | %.1fL used | Monthly: %.1f/%.1f L (%.1f%%)",
                       water_used, id(current_month_usage), id(monthly_water_budget),
                       id(monthly_water_budget) > 0 ? (id(current_month_usage) / id(monthly_water_budget)) * 100.0f : 0.0f);
            } else {
              ESP_LOGW("irrigation", "⚠️ Zone 1 invalid water_used (%.1f) - skipped", water_used);
            }
          } else {
            ESP_LOGD("irrigation", "Zone 1 short run (%llds < 5s) - water not counted", duration);
          }

