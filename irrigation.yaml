          // (If any check above blocked, it set cycle_soak_script_blocked=true and returned.
          //  The cleanup below runs only on natural completion or after successful start.)

      # BUG #29 FIX: If pre-flight blocked, clear irrigation_busy and drain queue.
      # Callers (button handlers and drain_queue) set irrigation_busy=true BEFORE calling
      # this script. Without this guard, a blocked pre-flight silently leaves the system
      # locked (irrigation_busy=true forever, every subsequent press queues or is blocked).
      - if:
          condition:
            lambda: 'return id(cycle_soak_script_blocked);'
          then:
            - lambda: |-
                ESP_LOGW("irrigation", "🚫 Cycle & Soak pre-flight BLOCKED — clearing busy and draining queue");
                id(irrigation_busy) = false;
                id(in_program_run) = false;
                id(watering_trigger_source) = "Idle";
                id(dev1_valve_status).publish_state("Idle");
                id(drain_queue).execute();

      # All remaining steps guarded by !cycle_soak_script_blocked
      - if:
          condition:
            lambda: 'return !id(cycle_soak_script_blocked);'
          then:
            - logger.log: "Starting all enabled zones - Cycle & Soak mode"
      
      # Turn off Auto Advance for cycle & soak
      - if:
          condition:
            lambda: 'return !id(cycle_soak_script_blocked);'
          then:
            - switch.turn_off: dev1_auto_advance
            - logger.log: "Auto Advance OFF for Cycle & Soak"
      
      # Set busy flags
      - if:
          condition:
            lambda: 'return !id(cycle_soak_script_blocked);'
          then:
            - lambda: |-
                id(irrigation_busy) = true;
                id(in_program_run) = false;
      
      # Calculate grand total duration for ALL enabled zones (all cycles + all soaks)
      # This gives accurate overall progress across the entire all-zones run.
      - if:
          condition:
            lambda: 'return !id(cycle_soak_script_blocked);'
          then:
            - lambda: |-
                int cycle_sec  = id(cycle_duration_minutes) * 60;
                int soak_sec   = id(soak_duration_minutes) * 60;
                int grand_total = 0;
                // Sum total time for each ENABLED zone (valve_duration * all cycles+soaks)
                auto zone_total = [&](float dur_sec) -> int {
                  int dur = (int)dur_sec;
                  if (dur <= 0 || cycle_sec <= 0) return 0;
                  int n = (dur + cycle_sec - 1) / cycle_sec;
                  return (n * cycle_sec) + ((n - 1) * soak_sec);
                };
                if (id(zone1_enable).state) grand_total += zone_total(id(Lawn_irrigation_controller_1_duration).state * 60);
                if (id(zone2_enable).state) grand_total += zone_total(id(Lawn_irrigation_controller_2_duration).state * 60);
                if (id(zone3_enable).state) grand_total += zone_total(id(Lawn_irrigation_controller_3_duration).state * 60);
                if (id(zone4_enable).state) grand_total += zone_total(id(Lawn_irrigation_controller_4_duration).state * 60);
                if (id(zone5_enable).state) grand_total += zone_total(id(Lawn_irrigation_controller_5_duration).state * 60);
                if (id(zone6_enable).state) grand_total += zone_total(id(Lawn_irrigation_controller_6_duration).state * 60);
                if (id(zone7_enable).state) grand_total += zone_total(id(Lawn_irrigation_controller_7_duration).state * 60);
                if (id(zone8_enable).state) grand_total += zone_total(id(Lawn_irrigation_controller_8_duration).state * 60);
                id(cycle_soak_total_duration) = grand_total;
                id(cycle_soak_elapsed_time) = 0;
                ESP_LOGI("irrigation", "\U0001F4CA All-Zones C&S grand total: %d sec (%d enabled zones, %d sec/cycle, %d sec/soak)",
                         grand_total, 
                         (int)id(zone1_enable).state + (int)id(zone2_enable).state +
                         (int)id(zone3_enable).state + (int)id(zone4_enable).state +
                         (int)id(zone5_enable).state + (int)id(zone6_enable).state +
                         (int)id(zone7_enable).state + (int)id(zone8_enable).state,
                         cycle_sec, soak_sec);
      
      # Zone 1
      - if:
          condition:
            lambda: 'return !id(cycle_soak_script_blocked) && id(zone1_enable).state;'
          then:
            - script.execute:
                id: run_zone_with_cycles
                zone: 0
                duration: !lambda "return id(Lawn_irrigation_controller_1_duration).state * 60;"
                add_delay: true
                force_normal: false
            - script.wait: run_zone_with_cycles
      
      # Zone 2
      - if:
