    set_action:
      - sprinkler.set_multiplier:
          id: $devicename1
          multiplier: !lambda 'return x;'
      - lambda: "id(${dev1_what}_multiplier).publish_state(x);"

  # Rain delay days
  - platform: template
    id: rain_delay_days_input
    name: "Rain Delay Days"
    min_value: 0
    max_value: 14
    step: 1
    icon: "mdi:weather-rainy"
    mode: box
    lambda: "return id(rain_delay_days);"
    set_action:
      - lambda: |-
          id(rain_delay_days) = (int)x;
          if (x > 0) {
            auto _rd_time = id(homeassistant_time).now();
            if (!_rd_time.is_valid()) {
              ESP_LOGW("irrigation", "⚠️ Rain delay set but time not synced — end time will be corrected when time syncs");
              id(rain_delay_end_time) = 0;  // Will be set correctly once time syncs
            } else {
              id(rain_delay_end_time) = _rd_time.timestamp + (x * ${seconds_per_day});
              ESP_LOGI("irrigation", "🌧️ Rain delay set: %d day(s)", (int)x);
              {
                char _a[80]; snprintf(_a, sizeof(_a), "🌧️ MANUAL RAIN DELAY: %d day(s)", (int)x);
                id(irrigation_latest_alert) = _a;
                id(irrigation_alert_sensor).publish_state(_a);
