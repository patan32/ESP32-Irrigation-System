  # ═══════════════════════════════════════════════
  # WATER USAGE RESET BUTTONS (Hunter Pro-C Style)
  # ═══════════════════════════════════════════════
  
  - platform: template
    name: "$dev1_what Reset All Water Usage"
    icon: "mdi:water-off"
    on_press:
      - lambda: |-
          ESP_LOGI("irrigation", "");
          ESP_LOGI("irrigation", "💧 ═══════════════════════════════════════════════");
          ESP_LOGI("irrigation", "💧 RESETTING ALL WATER USAGE COUNTERS");
          ESP_LOGI("irrigation", "💧 ═══════════════════════════════════════════════");
          ESP_LOGI("irrigation", "Previous Total: %.1f L", id(total_water_litres));
          ESP_LOGI("irrigation", "Previous Monthly: %.1f L", id(current_month_usage));
          
          // Reset all zone counters
          id(zone1_water_litres) = 0;
          id(zone2_water_litres) = 0;
          id(zone3_water_litres) = 0;
          id(zone4_water_litres) = 0;
          id(zone5_water_litres) = 0;
          id(zone6_water_litres) = 0;
          id(zone7_water_litres) = 0;
          id(zone8_water_litres) = 0;
          
          // Reset total
          id(total_water_litres) = 0;
          
          // Reset monthly usage counter
          id(current_month_usage) = 0;
          
          // Set reset timestamp — only if time is synced; 0 is handled downstream
          // as "Never" so storing epoch 0 here is safe and avoids a 50-year "days since reset".
          {
            auto _rst_time = id(homeassistant_time).now();
            id(water_reset_timestamp) = _rst_time.is_valid() ? _rst_time.timestamp : 0;
            if (!_rst_time.is_valid()) {
              ESP_LOGW("irrigation", "⚠️ Reset All Water Usage: time not synced — reset timestamp set to 0 (will show 'Never' until time syncs)");
            }
          }
          
          ESP_LOGI("irrigation", "✅ All water usage counters reset to 0 L");
          ESP_LOGI("irrigation", "✅ Monthly usage counter reset to 0 L");
          ESP_LOGI("irrigation", "📊 Water Budget: 0.0L / %.1fL (0.0%%)", id(monthly_water_budget));
          ESP_LOGI("irrigation", "");
          ESP_LOGI("irrigation", "💾 Saving to flash memory... (please wait 3 seconds)");
      
      # Give time for flash write to complete
      - delay: 3s
      
      - lambda: |-
          ESP_LOGI("irrigation", "✅ Reset complete - safe to reboot now");
          ESP_LOGI("irrigation", "");

