output:
  # ── ZONE RELAY GPIO OUTPUTS ──────────────────────────────────────────────────
  # GPIO outputs are decoupled from the zone template switches.
  # This means the physical pin only ever goes HIGH when our code explicitly calls
  # output.turn_on — not when an ESPHome dashboard user toggles a switch entity.
  # Result: zero relay click on any blocked direct activation.
  - platform: gpio
    id: relay_zone_1_out
    pin:
      number: $zone1_pin
      mode:
        output: true
    inverted: true

  - platform: gpio
    id: relay_zone_2_out
    pin:
      number: $zone2_pin
      mode:
        output: true
    inverted: true

  - platform: gpio
    id: relay_zone_3_out
    pin:
      number: $zone3_pin
      mode:
        output: true
    inverted: true

  - platform: gpio
    id: relay_zone_4_out
    pin:
      number: $zone4_pin
      mode:
        output: true
    inverted: true

  - platform: gpio
    id: relay_zone_5_out
    pin:
      number: $zone5_pin
      mode:
        output: true
    inverted: true

  - platform: gpio
    id: relay_zone_6_out
    pin:
      number: $zone6_pin
      mode:
        output: true
    inverted: true

  - platform: gpio
    id: relay_zone_7_out
    pin:
      number: $zone7_pin
      mode:
        output: true
    inverted: true

  - platform: gpio
    id: relay_zone_8_out
    pin:
      number: $zone8_pin
      mode:
        output: true
    inverted: true


switch:
  # ═══════════════════════════════════════════════════════════
  # PROGRAM ENABLE SWITCHES & ADDITIONAL START TIME ENABLES
  # ═══════════════════════════════════════════════════════════
  
  - platform: template
    id: program_a_enable_switch
    name: "✅ ${program_a_name} Enabled"
    icon: "mdi:alpha-a-circle"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    lambda: "return id(program_a_enabled);"
    turn_on_action:
      - lambda: "id(program_a_enabled) = true;"
    turn_off_action:

      - lambda: "id(program_a_enabled) = false;"
  
  - platform: template
    id: program_b_enable_switch
    name: "✅ ${program_b_name} Enabled"
    icon: "mdi:alpha-b-circle"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: "return id(program_b_enabled);"
    turn_on_action:
      - lambda: "id(program_b_enabled) = true;"
    turn_off_action:
      - lambda: "id(program_b_enabled) = false;"
  
