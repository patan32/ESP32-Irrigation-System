sprinkler:
  - id: $devicename1
    main_switch:
      name: "$dev1_what Start-Stop-Resume"
      id: dev1_main_switch
      internal: true
      on_turn_off:
        - lambda: |-

            // Don't stop run_zone_with_cycles during cycle/soak mode with multiple cycles
            // Only stop if we're in normal mode or if it's a manual stop
            bool in_cycle_soak = (id(total_cycles) > 0 && id(current_cycle) > 0);
            
            if (!in_cycle_soak) {
              ESP_LOGI("irrigation", "Main switch OFF - stopping run_zone_with_cycles (normal mode)");
              id(run_zone_with_cycles).stop();
              
              // Reset soak countdown when stopping
              id(cycle_soak_is_soaking) = false;
              id(cycle_soak_soak_end_time) = 0;
              id(soak_countdown_seconds) = 0;
            } else {
              ESP_LOGI("irrigation", "Main switch OFF - NOT stopping script (in cycle/soak, cycle %d/%d)",
                       id(current_cycle), id(total_cycles));
            }
            
            if (id(is_paused)) return;

            // Only clear state if not in active cycle/soak
            if (!in_cycle_soak) {
              id(active_zone_number) = -1;
              id(current_cycle) = 0;
              id(total_cycles) = 0;
              id(cycle_soak_total_duration) = 0;
              id(cycle_soak_elapsed_time) = 0;
              id(normal_run_duration_seconds) = 0;

              // In normal mode, main switch off = run finished: clear busy and drain queue.
              // In cycle/soak mode, the stop button manages irrigation_busy explicitly —
              // don't touch it here to avoid racing with the stop button's own cleanup.
              if (id(irrigation_busy) && !id(in_program_run)) {
                id(irrigation_busy) = false;
                id(drain_queue).execute();
              }
            } else {
              ESP_LOGI("irrigation", "Main switch OFF (cycle/soak) — irrigation_busy managed by stop button");
            }
            
            // Reset valve status to Idle when main switch turns off
            id(dev1_valve_status).publish_state("Idle");

      on_turn_on:
        - lambda: |-
            // CRITICAL: Check if irrigation system is enabled
            if (!id(irrigation_system_enable).state) {
              std::string _reason = "🚫 Irrigation system disabled";
              id(last_zone_block_reason) = _reason;
              id(zone_block_reason_sensor).publish_state(_reason);
              ESP_LOGW("irrigation", "🚫 BLOCKED - Irrigation system is DISABLED");
              id(dev1_main_switch).turn_off();
              return;
            }
            
            // Check rain delay (is_valid guard: avoids false-block when time not synced)
            {
              auto _msw_time = id(homeassistant_time).now();
              if (_msw_time.is_valid() && id(rain_delay_end_time) > _msw_time.timestamp) {
                int64_t rd_days = (id(rain_delay_end_time) - _msw_time.timestamp) / ${seconds_per_day};
                char _rb[60];
                snprintf(_rb, sizeof(_rb), "🌧️ Rain delay active (%lld day(s))", rd_days);
                std::string _reason(_rb);
                id(last_zone_block_reason) = _reason;
                id(zone_block_reason_sensor).publish_state(_reason);
                ESP_LOGW("irrigation", "⛈️ BLOCKED - Rain delay is active");
                id(dev1_main_switch).turn_off();
                return;
              }
            }
            
            // Weather check (unless override is active)
            if (!id(manual_weather_override)) {
              std::string w = id(weather_forecast_home).state;
              if (!w.empty() && w != "unknown" && w != "unavailable") {
                if (w == "rainy" || w == "pouring" || w == "snowy" || w == "snowy-rainy") {
                  char _wb[80];
                  snprintf(_wb, sizeof(_wb), "⛈️ Bad weather: %s", w.c_str());
                  std::string _reason(_wb);
                  id(last_zone_block_reason) = _reason;
                  id(zone_block_reason_sensor).publish_state(_reason);
                  ESP_LOGW("irrigation", "⛈️ BLOCKED - Bad weather: %s (Enable Weather Override to force)", w.c_str());
                  id(dev1_main_switch).turn_off();
                  return;
                }
              }
            }
            
            // Time restriction check
            if (id(is_time_restricted)) {
              std::string _reason = "⏰ Time restriction active";
              id(last_zone_block_reason) = _reason;
              id(zone_block_reason_sensor).publish_state(_reason);
              ESP_LOGW("irrigation", "⏰ BLOCKED - Time restriction active");
              id(dev1_main_switch).turn_off();
              return;
            }
            
            // Blackout check (incl. NZ public holidays via is_blackout_date sensor)
            if (id(is_blackout_date).state) {
              std::string _reason = "🚫 Blackout date active";
              id(last_zone_block_reason) = _reason;
              id(zone_block_reason_sensor).publish_state(_reason);
              ESP_LOGW("irrigation", "🚫 BLOCKED - Blackout date active");
              id(dev1_main_switch).turn_off();
              return;
            }
            
            // ═══════════════════════════════════════════════════════════
            // ZONE ENABLE CHECK - FIX FOR BUG: Main switch activates when disabled zone is pressed
            // ═══════════════════════════════════════════════════════════
            // The ESPHome sprinkler component automatically turns on the main switch when ANY zone
            // switch is activated - even if that zone is disabled. We need to verify that the zone
            // requesting activation is actually enabled before allowing the main switch to proceed.
            //
            // Without this check, the following sequence occurs when a disabled zone is pressed:
            //   1. User presses disabled Zone X switch
            //   2. Sprinkler component turns ON main switch (immediate, before zone checks)
            //   3. Zone X turn_on_action detects disabled state and turns off zone
            //   4. Main switch already activated and logged "all checks passed"
            //   5. Zone turns off, causing main switch to turn off
            //   Result: Brief activation, timer runs, confusing UX
            //
            // This check prevents the race condition by validating zone enable state at main switch level.
            
            // Get the active valve number (0-7 for zones 1-8, or -1 if none active)
            int active_valve = id($devicename1).active_valve().value_or(-1);
            
            if (active_valve >= 0 && active_valve < 8) {
              bool zone_enabled = false;
              
              // Check if the specific zone requesting activation is enabled
              switch(active_valve) {
                case 0: zone_enabled = id(zone1_enable).state; break;
                case 1: zone_enabled = id(zone2_enable).state; break;
                case 2: zone_enabled = id(zone3_enable).state; break;
                case 3: zone_enabled = id(zone4_enable).state; break;
                case 4: zone_enabled = id(zone5_enable).state; break;
                case 5: zone_enabled = id(zone6_enable).state; break;
                case 6: zone_enabled = id(zone7_enable).state; break;
                case 7: zone_enabled = id(zone8_enable).state; break;
              }
              
              if (!zone_enabled) {
                char _reason_buf[80];
                snprintf(_reason_buf, sizeof(_reason_buf), "🚫 Zone %d disabled (main switch blocked)", active_valve + 1);
                std::string _reason(_reason_buf);
                id(last_zone_block_reason) = _reason;
                id(zone_block_reason_sensor).publish_state(_reason);
                ESP_LOGW("irrigation", "🚫 BLOCKED - Main switch activation denied: Zone %d is DISABLED", active_valve + 1);
                id(dev1_main_switch).turn_off();
                return;
              }
            }
            // ═══════════════════════════════════════════════════════════
            
            ESP_LOGI("irrigation", "✅ Main switch turned ON - all checks passed");

    auto_advance_switch:
      name: "$dev1_what Auto Advance"
      id: dev1_auto_advance
      restore_mode: ALWAYS_ON

