# Master Valve (Optional - like Hunter Pro-C)
# Can be enabled/disabled via "Enable Master Valve" switch
# Automatically opens when any zone is active (if enabled)
  - platform: gpio
    restore_mode: ALWAYS_OFF
    internal: true
    id: master_valve_relay
    name: "Master Valve Relay"
    pin: $master_valve_pin
    inverted: true

  # ═══════════════════════════════════════════════
  # PRODUCTION FEATURES - WATERING WINDOWS & OVERRIDES
  # ═══════════════════════════════════════════════
  
  - platform: template
    name: "$dev1_what Budget Override"
    id: budget_override_switch
    icon: "mdi:water-pump-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - lambda: |-
          id(budget_override_active) = true;
          ESP_LOGW("irrigation", "");
          ESP_LOGW("irrigation", "⚠️ ═══════════════════════════════════════════════");
          ESP_LOGW("irrigation", "⚠️ WATER BUDGET OVERRIDE ACTIVE");
          ESP_LOGW("irrigation", "⚠️ ═══════════════════════════════════════════════");
          ESP_LOGW("irrigation", "⚠️ Watering will continue even if budget exceeded");
          ESP_LOGW("irrigation", "⚠️ Current usage: %.1fL / %.1fL (%.1f%%)", 
                   id(current_month_usage), id(monthly_water_budget),
                   id(monthly_water_budget) > 0 ? (id(current_month_usage) / id(monthly_water_budget)) * 100.0 : 0.0);
          ESP_LOGW("irrigation", "⚠️ ═══════════════════════════════════════════════");
          ESP_LOGW("irrigation", "");
    on_turn_off:
      - lambda: |-
          id(budget_override_active) = false;
          ESP_LOGI("irrigation", "");
          ESP_LOGI("irrigation", "✅ Water budget enforcement RE-ENABLED");
          
          // Immediately re-evaluate budget state so user gets instant feedback
          if (id(monthly_water_budget) > 0) {
            float _bo_pct = (id(current_month_usage) / id(monthly_water_budget)) * 100.0f;
            if (_bo_pct >= 100.0f) {
              // Budget is still exceeded — re-set the flag and warn
              id(budget_exceeded) = true;
              ESP_LOGW("irrigation", "⚠️ WARNING: Budget still %.0f%% used (%.1fL / %.1fL)", _bo_pct,
                       id(current_month_usage), id(monthly_water_budget));
              ESP_LOGW("irrigation", "⚠️ Watering will remain BLOCKED until next month or override is re-enabled");
            } else {
              id(budget_exceeded) = false;
              ESP_LOGI("irrigation", "✅ Budget usage: %.0f%% — watering is allowed", _bo_pct);
            }
          }
          ESP_LOGI("irrigation", "");

