  # ═══════════════════════════════════════════════════════════
  # NZ PUBLIC HOLIDAY TIMESTAMP SENSORS (ISO datetime strings)
  # ═══════════════════════════════════════════════════════════
  # These parse ISO 8601 format: "2026-04-03T00:00:00+00:00"
  # and convert to Unix timestamps for the quick-add dropdown
  
  - platform: homeassistant
    id: good_friday_timestamp_text
    entity_id: $ha_good_friday_ts
    internal: true
    on_value:
      then:
        - lambda: |-
            // Parse ISO datetime string to Unix timestamp
            // Format: "2026-04-03T00:00:00+00:00" or "2026-04-03"
            if (x.empty() || x == "unavailable" || x == "unknown") {
              ESP_LOGW("blackout", "⚠️ Good Friday timestamp unavailable");
              return;
            }
            
            // Extract date components (works for both ISO formats)
            if (x.length() < 10) {
              ESP_LOGW("blackout", "⚠️ Good Friday timestamp invalid format: %s", x.c_str());
              return;
            }
            
            int year = atoi(x.substr(0, 4).c_str());
            int month = atoi(x.substr(5, 2).c_str());
            int day = atoi(x.substr(8, 2).c_str());
            
            // Validate date range
            { int _now_yr = id(homeassistant_time).now().year; if (_now_yr > 0 && (year < (_now_yr - 1) || year > (_now_yr + 4))) { ESP_LOGW("blackout", "⚠️ Good Friday year out of range: %d (current: %d)", year, _now_yr); return; } }
            
            // Convert to Unix timestamp
            struct tm timeinfo = {};
            timeinfo.tm_year = year - 1900;
            timeinfo.tm_mon = month - 1;
            timeinfo.tm_mday = day;
            timeinfo.tm_hour = 0;
            timeinfo.tm_min = 0;
            timeinfo.tm_sec = 0;
            timeinfo.tm_isdst = -1;
            
            time_t timestamp = mktime(&timeinfo);
            
            if (timestamp > 0) {
              id(good_friday_timestamp) = timestamp;
              ESP_LOGI("blackout", "✅ Good Friday: %s → timestamp %lld", x.c_str(), timestamp);
            } else {
              ESP_LOGW("blackout", "⚠️ Good Friday timestamp conversion failed");
            }
    
